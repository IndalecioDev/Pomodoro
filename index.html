<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <title>Ritual de Lectura</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Orbitron:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<canvas id="pcvs"></canvas>
<div class="flash" id="flash"></div>

<div class="wrap">

  <div class="header">
    <div class="eyebrow" id="eyebrow">modo lectura</div>
    <h1>Ritual de Lectura</h1>
    <p class="subtitle">Convierte tu sesión en el ritual perfecto</p>
  </div>

  <div class="card">
    <div class="card-label">Duración de la sesión</div>
    <div class="minutes-row">
      <label for="minutes">Minutos</label>
      <input type="number" id="minutes" min="1" max="240" value="25">
    </div>
  </div>

  <div class="card">
    <div class="card-label">Elige tu atmósfera</div>
    <div class="mode-grid" id="mode-grid"></div>
  </div>

  <div class="timer-card">
    <div class="ring-wrap">
      <svg class="ring-svg" viewBox="0 0 200 200">
        <g id="ticks"></g>
        <circle class="ring-track" cx="100" cy="100" r="85"/>
        <circle class="ring-prog" id="ring-prog" cx="100" cy="100" r="85"/>
      </svg>
      <div class="ring-inner">
        <div id="time-display">25:00</div>
        <div id="status-text">A sumergirte en la lectura</div>
      </div>
    </div>
  </div>

  <div class="buttons">
    <button class="btn-start" id="btn-start">Empezar</button>
    <button class="btn-pause" id="btn-pause">Pausa</button>
    <button class="btn-reset" id="btn-reset">Reiniciar</button>
  </div>

  <div class="music-bar">
    <span class="mdot" id="mdot"></span>
    <div class="wave-bars" id="waves">
      <div class="wave-bar"></div><div class="wave-bar"></div>
      <div class="wave-bar"></div><div class="wave-bar"></div>
      <div class="wave-bar"></div>
    </div>
    <span id="music-text">Elige un modo para iniciar</span>
  </div>

  <div id="video-wrapper" class="video-wrapper" hidden>
    <div class="video-titlebar">
      <span class="vdot"></span>
      <span id="video-title">Ambientación activa</span>
    </div>
    <div class="video-frame">
      <div id="yt-player"></div>
    </div>
  </div>

  <p class="footer">© 2025 · Inda · Ritual de Lectura</p>

</div>

<script src="script.js"></script>

</body>
</html>
